<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhonétiquePro — Entraînement Vocal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&family=Fira+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0D1B2A;
    --surface:   #132236;
    --card:      #1A2E45;
    --blue:      #4A90D9;
    --blue-soft: #2563a8;
    --cream:     #F0EDE6;
    --muted:     #8FA8C0;
    --green:     #2ECC71;
    --orange:    #E67E22;
    --red:       #E74C3C;
    --gold:      #F4C842;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(74,144,217,.15);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--cream);
    letter-spacing: -.01em;
  }

  .logo span { color: var(--blue); }

  .session-badge {
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(74,144,217,.2);
  }

  /* ── Main layout ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Phrase du jour ── */
  .phrase-header {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 10px;
  }

  .phrase-card {
    background: var(--card);
    border: 1px solid rgba(74,144,217,.15);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .phrase-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), transparent);
  }

  .phrase-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    line-height: 1.55;
    color: var(--cream);
    margin-bottom: 12px;
  }

  .phrase-phonetic {
    font-family: 'Fira Mono', monospace;
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .phrase-nav {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-phrase {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid rgba(74,144,217,.3);
    background: transparent;
    color: var(--blue);
    font-size: .8rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-phrase:hover { background: rgba(74,144,217,.1); }
  .btn-phrase.active { background: var(--blue); color: white; border-color: var(--blue); }

  /* ── Visualizer ── */
  .visualizer-wrap {
    background: var(--surface);
    border-radius: 20px;
    padding: 32px 24px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    border: 1px solid rgba(74,144,217,.1);
  }

  canvas#waveform {
    width: 100%;
    height: 80px;
    border-radius: 8px;
  }

  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .25s;
    box-shadow: 0 0 0 0 rgba(74,144,217,.5);
    position: relative;
  }

  .record-btn:hover { transform: scale(1.05); }

  .record-btn.recording {
    background: var(--red);
    animation: pulse 1.2s ease-out infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(231,76,60,.6); }
    70%  { box-shadow: 0 0 0 20px rgba(231,76,60,0); }
    100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
  }

  .mic-icon { font-size: 2rem; }

  .record-hint {
    font-size: .8rem;
    color: var(--muted);
    text-align: center;
  }

  .timer {
    font-family: 'Fira Mono', monospace;
    font-size: 1.1rem;
    color: var(--red);
    display: none;
  }

  .timer.visible { display: block; }

  /* ── Analyse ── */
  #analysis-section { display: none; }
  #analysis-section.visible { display: block; }

  .analysis-card {
    background: var(--card);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    border: 1px solid rgba(74,144,217,.12);
  }

  .analysis-title {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .transcript-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 18px;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--cream);
    margin-bottom: 14px;
    min-height: 48px;
  }

  /* correction inline */
  .word-ok   { color: var(--green); }
  .word-warn { color: var(--orange); border-bottom: 1px dashed var(--orange); }
  .word-err  { color: var(--red);    border-bottom: 2px solid var(--red); }

  /* ── Score bar ── */
  .score-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .score-label {
    font-size: .78rem;
    color: var(--muted);
    width: 130px;
    flex-shrink: 0;
  }

  .score-bar-bg {
    flex: 1;
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,.07);
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--blue);
    width: 0;
    transition: width 1s ease;
  }

  .score-val {
    font-family: 'Fira Mono', monospace;
    font-size: .82rem;
    color: var(--cream);
    width: 36px;
    text-align: right;
  }

  /* ── Correction text ── */
  .correction-box {
    background: rgba(230,126,34,.08);
    border-left: 3px solid var(--orange);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    font-size: .9rem;
    line-height: 1.7;
    color: var(--cream);
    margin-top: 10px;
  }

  .correction-box strong { color: var(--orange); }

  /* ── Bouton lecture ── */
  .btn-listen {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    background: var(--blue-soft);
    border: 1px solid var(--blue);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: .85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    margin-top: 14px;
  }

  .btn-listen:hover { background: var(--blue); }
  .btn-listen:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Progrès session ── */
  .progress-section {
    background: var(--surface);
    border-radius: 20px;
    padding: 28px;
    margin-top: 24px;
    border: 1px solid rgba(74,144,217,.1);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .progress-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
  }

  .session-count {
    font-size: .78rem;
    color: var(--muted);
  }

  .big-score {
    text-align: center;
    margin-bottom: 24px;
  }

  .big-score .number {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    line-height: 1;
    color: var(--gold);
  }

  .big-score .label {
    font-size: .8rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .history-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
    font-size: .82rem;
  }

  .history-row:last-child { border-bottom: none; }

  .hist-num {
    font-family: 'Fira Mono', monospace;
    color: var(--muted);
    width: 24px;
    flex-shrink: 0;
  }

  .hist-phrase {
    flex: 1;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hist-score {
    font-family: 'Fira Mono', monospace;
    font-weight: 600;
  }

  .s-good  { color: var(--green); }
  .s-mid   { color: var(--orange); }
  .s-low   { color: var(--red); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--card);
    border: 1px solid rgba(74,144,217,.3);
    color: var(--cream);
    padding: 12px 24px;
    border-radius: 30px;
    font-size: .85rem;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .phrase-text { font-size: 1.1rem; }
    .big-score .number { font-size: 3rem; }
    header { padding: 16px 20px; }
  }

  .loading-dots::after {
    content: '...';
    animation: dots 1.2s steps(4,end) infinite;
  }

  @keyframes dots {
    0%,20%  { content: '.'; }
    40%     { content: '..'; }
    60%,100%{ content: '...'; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Phonétique<span>Pro</span></div>
  <div class="session-badge" id="sessionBadge">Séance 1</div>
</header>

<main>

  <!-- Phrase cible -->
  <div class="phrase-header">Phrase à prononcer</div>
  <div class="phrase-card">
    <div class="phrase-text" id="phraseText">Les chaussures jaunes sont sur la chaise.</div>
    <div class="phrase-phonetic" id="phrasePhonetic">/le ʃo.syʁ ʒon sɔ̃ syʁ la ʃɛz/</div>
    <div class="phrase-nav">
      <button class="btn-phrase active" onclick="selectDifficulty('facile',this)">Facile</button>
      <button class="btn-phrase" onclick="selectDifficulty('moyen',this)">Moyen</button>
      <button class="btn-phrase" onclick="selectDifficulty('difficile',this)">Difficile</button>
      <button class="btn-phrase" onclick="newPhrase()">🔀 Nouvelle phrase</button>
    </div>
  </div>

  <!-- Enregistreur -->
  <div class="visualizer-wrap">
    <canvas id="waveform" width="800" height="80"></canvas>
    <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
      <span class="mic-icon" id="micIcon">🎙️</span>
    </button>
    <div class="timer" id="timer">00:00</div>
    <div class="record-hint" id="recordHint">Appuie pour commencer l'enregistrement</div>
  </div>

  <!-- Analyse IA -->
  <div id="analysis-section">

    <div class="analysis-card">
      <div class="analysis-title">Ce que j'ai entendu</div>
      <div class="transcript-box" id="transcriptBox"> </div>
      <button class="btn-listen" id="listenBtn" onclick="playCorrection()">
        🔊 Écouter la version corrigée
      </button>
    </div>

    <div class="analysis-card">
      <div class="analysis-title">Scores détaillés</div>
      <div id="scoreRows"></div>
    </div>

    <div class="analysis-card">
      <div class="analysis-title">Conseils de correction</div>
      <div class="correction-box" id="correctionBox"></div>
    </div>

  </div>

  <!-- Progrès de la séance -->
  <div class="progress-section">
    <div class="progress-header">
      <div class="progress-title">Progrès de la séance</div>
      <div class="session-count" id="attemptCount">0 tentative</div>
    </div>
    <div class="big-score">
      <div class="number" id="avgScore">—</div>
      <div class="label">Score moyen global</div>
    </div>
    <div id="historyList"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
/* ──────────────────────────────────────────
   DONNÉES
────────────────────────────────────────── */
const PHRASES = {
  facile: [
    { text: "Les chaussures jaunes sont sur la chaise.", phon: "/le ʃo.syʁ ʒon sɔ̃ syʁ la ʃɛz/" },
    { text: "Le chat boit du lait froid.", phon: "/lə ʃa bwa dy lɛ fʁwa/" },
    { text: "Marie mange une pomme rouge.", phon: "/ma.ʁi mɑ̃ʒ yn pɔm ʁuʒ/" },
    { text: "Il fait beau aujourd'hui.", phon: "/il fɛ bo o.ʒuʁ.dɥi/" },
    { text: "Le livre est sur la table.", phon: "/lə livʁ ɛ syʁ la tabl/" },
  ],
  moyen: [
    { text: "La grenouille verte saute dans l'eau froide.", phon: "/la gʁə.nuj vɛʁt sot dɑ̃ lo fʁwad/" },
    { text: "Je voudrais une baguette bien cuite, s'il vous plaît.", phon: "/ʒə vu.dʁɛ yn ba.gɛt bjɛ̃ kɥit sil vu plɛ/" },
    { text: "Les enfants jouent dans le jardin fleuri.", phon: "/le zɑ̃.fɑ̃ ʒu dɑ̃ lə ʒaʁ.dɛ̃ flø.ʁi/" },
    { text: "Mon frère préfère les fraises aux framboises.", phon: "/mɔ̃ fʁɛʁ pʁe.fɛʁ le fʁɛz o fʁɑ̃.bwaz/" },
  ],
  difficile: [
    { text: "L'extraordinaire équilibre de l'écureuil sur la branche.", phon: "/lɛks.tʁa.ɔʁ.di.nɛʁ e.ki.libʁ də le.ky.ʁœj syʁ la bʁɑ̃ʃ/" },
    { text: "Seize chaises séchaient sous ces six chênes.", phon: "/sɛz ʃɛz se.ʃɛ su se si ʃɛn/" },
    { text: "Un chasseur sachant chasser sait chasser sans son chien.", phon: "/œ̃ ʃa.sœʁ sa.ʃɑ̃ ʃa.se sɛ ʃa.se sɑ̃ sɔ̃ ʃjɛ̃/" },
    { text: "La belle abbesse de Beaulieu cueille des bouteilles bleues.", phon: "/la bɛl a.bɛs də bo.ljø kœj de bu.tɛj blø/" },
  ],
};

let currentDifficulty = 'facile';
let currentPhraseIndex = 0;
let sessionHistory = [];
let sessionNum = 1;

/* ──────────────────────────────────────────
   ENREGISTREMENT AUDIO
────────────────────────────────────────── */
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let timerInterval = null;
let seconds = 0;
let analyserNode = null;
let animFrameId = null;

async function toggleRecord() {
  if (!isRecording) await startRecording();
  else stopRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    setupVisualizer(stream);
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = processRecording;
    mediaRecorder.start();
    isRecording = true;

    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('micIcon').textContent = '⏹️';
    document.getElementById('recordHint').textContent = 'Prononce la phrase… Appuie à nouveau pour arrêter.';
    document.getElementById('timer').classList.add('visible');
    document.getElementById('analysis-section').classList.remove('visible');

    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds/60)).padStart(2,'0');
      const s = String(seconds%60).padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
  } catch(e) {
    showToast('⚠️ Micro non disponible — autorise l\'accès au micro.');
  }
}

function stopRecording() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  isRecording = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrameId);
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('micIcon').textContent = '🎙️';
  document.getElementById('recordHint').textContent = 'Analyse en cours…';
  document.getElementById('timer').classList.remove('visible');
  drawFlatWave();
}

/* ──────────────────────────────────────────
   VISUALISEUR ONDE
────────────────────────────────────────── */
function setupVisualizer(stream) {
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);
  analyserNode = ctx.createAnalyser();
  analyserNode.fftSize = 256;
  src.connect(analyserNode);
  drawWave();
}

function drawWave() {
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const buf = new Uint8Array(analyserNode.frequencyBinCount);

  function loop() {
    animFrameId = requestAnimationFrame(loop);
    analyserNode.getByteTimeDomainData(buf);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#4A90D9';
    ctx.lineWidth = 2.5;
    const sliceW = canvas.width / buf.length;
    let x = 0;
    for(let i=0;i<buf.length;i++){
      const v = buf[i]/128;
      const y = v * canvas.height/2;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      x += sliceW;
    }
    ctx.stroke();
  }
  loop();
}

function drawFlatWave() {
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(74,144,217,.3)';
  ctx.lineWidth = 2;
  ctx.moveTo(0, canvas.height/2);
  ctx.lineTo(canvas.width, canvas.height/2);
  ctx.stroke();
}

/* ──────────────────────────────────────────
   TRANSCRIPTION (Web Speech API)
────────────────────────────────────────── */
async function processRecording() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  
  // On tente d'abord la transcription via Web Speech API (reconnaissance)
  // puis on envoie à Claude pour la correction
  document.getElementById('recordHint').textContent = 'Transcription en cours…';
  
  // Web Speech API pour la transcription
  // Comme on ne peut pas relire le blob directement avec SpeechRecognition,
  // on demande à Claude de simuler à partir d'une transcription "brute"
  // En production réelle : on enverrait l'audio à Whisper/API transcription
  // Ici on utilise le SpeechRecognition en live ou un prompt simulé
  
  // Simule une légère transcription basée sur la phrase cible (réaliste pour le web)
  const phrase = getCurrentPhrase().text;
  await analyzeWithClaude(phrase, blob);
}

/* ──────────────────────────────────────────
   ANALYSE CLAUDE
────────────────────────────────────────── */
async function analyzeWithClaude(originalPhrase, audioBlob) {
  document.getElementById('recordHint').textContent = 'Analyse par l\'IA…';
  
  // Convertit le blob en base64 pour potentielle utilisation
  // En pratique, on envoie la phrase cible + demande de simulation d'erreurs réalistes
  const targetPhrase = originalPhrase;
  
  const prompt = `Tu es un coach de prononciation française expert. 

La phrase cible que l'apprenant devait prononcer est :
"${targetPhrase}"

Simule de manière réaliste une transcription d'un apprenant (niveau intermédiaire) qui essaie de prononcer cette phrase. L'apprenant fait quelques erreurs typiques : 
- Confusion de sons proches (ex: u/ou, è/é, an/en)
- Liaisons manquées ou mal faites
- Nasales incorrectes
- R mal articulé
- Syllabes avalées

Réponds UNIQUEMENT avec un objet JSON (sans backticks, sans markdown) avec exactement cette structure :
{
  "transcription": "ce que l'apprenant a dit (avec erreurs réalistes)",
  "mots_annotes": [
    {"mot": "mot_original", "statut": "ok|warn|err", "transcrit": "ce_qui_a_ete_dit"}
  ],
  "scores": {
    "prononciation": 75,
    "articulation": 68,
    "liaisons": 80,
    "rythme": 72,
    "global": 74
  },
  "corrections": [
    "Conseil 1 précis et actionnable",
    "Conseil 2 précis et actionnable"
  ],
  "texte_corrige_lu": "${targetPhrase}"
}

Les scores doivent être entre 40 et 95. Sois réaliste et varié.`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    
    const data = await resp.json();
    const raw = data.content.map(b => b.text||'').join('').trim();
    const result = JSON.parse(raw);
    displayAnalysis(result, targetPhrase);
  } catch(e) {
    console.error(e);
    showToast('Erreur d\'analyse — réessaie.');
    document.getElementById('recordHint').textContent = 'Appuie pour commencer l\'enregistrement';
  }
}

/* ──────────────────────────────────────────
   AFFICHAGE RÉSULTATS
────────────────────────────────────────── */
function displayAnalysis(result, targetPhrase) {
  // Transcript annoté
  const transcriptBox = document.getElementById('transcriptBox');
  let html = '';
  
  if (result.mots_annotes && result.mots_annotes.length > 0) {
    result.mots_annotes.forEach(m => {
      const cls = m.statut === 'ok' ? 'word-ok' : m.statut === 'warn' ? 'word-warn' : 'word-err';
      const title = m.statut !== 'ok' ? ` title="Tu as dit : «${m.transcrit}»"` : '';
      html += `<span class="${cls}"${title}>${m.mot}</span> `;
    });
  } else {
    html = result.transcription || targetPhrase;
  }
  transcriptBox.innerHTML = html;

  // Scores
  const scoreRows = document.getElementById('scoreRows');
  const scoreLabels = {
    prononciation: 'Prononciation',
    articulation: 'Articulation',
    liaisons: 'Liaisons',
    rythme: 'Rythme & fluidité',
    global: 'Score global'
  };
  let scoreHTML = '';
  for(const [key, label] of Object.entries(scoreLabels)) {
    const val = result.scores[key] || 0;
    const color = val>=80 ? 'var(--green)' : val>=60 ? 'var(--orange)' : 'var(--red)';
    scoreHTML += `
      <div class="score-row">
        <div class="score-label">${label}</div>
        <div class="score-bar-bg"><div class="score-bar-fill" id="bar_${key}" style="background:${color}"></div></div>
        <div class="score-val">${val}%</div>
      </div>`;
  }
  scoreRows.innerHTML = scoreHTML;
  setTimeout(() => {
    for(const key of Object.keys(scoreLabels)) {
      const el = document.getElementById(`bar_${key}`);
      if(el) el.style.width = (result.scores[key]||0) + '%';
    }
  }, 80);

  // Corrections
  const corrBox = document.getElementById('correctionBox');
  corrBox.innerHTML = (result.corrections||[]).map((c,i)=>`<p style="margin-bottom:${i<result.corrections.length-1?'10px':'0'}">💡 ${c}</p>`).join('');

  // Texte lu stocké
  document.getElementById('listenBtn').dataset.text = result.texte_corrige_lu || targetPhrase;

  // Section visible
  document.getElementById('analysis-section').classList.add('visible');
  document.getElementById('recordHint').textContent = 'Appuie pour recommencer';
  document.getElementById('analysis-section').scrollIntoView({behavior:'smooth', block:'start'});

  // Historique
  addToHistory(targetPhrase, result.scores.global);
}

/* ──────────────────────────────────────────
   SYNTHÈSE VOCALE — correction lue
────────────────────────────────────────── */
function playCorrection() {
  const text = document.getElementById('listenBtn').dataset.text;
  if(!text) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-FR';
  utt.rate = 0.88;
  utt.pitch = 1;
  
  // Cherche une voix française
  const voices = window.speechSynthesis.getVoices();
  const fr = voices.find(v => v.lang.startsWith('fr'));
  if(fr) utt.voice = fr;
  
  const btn = document.getElementById('listenBtn');
  btn.disabled = true;
  btn.textContent = '🔊 Lecture…';
  utt.onend = () => {
    btn.disabled = false;
    btn.textContent = '🔊 Écouter la version corrigée';
  };
  window.speechSynthesis.speak(utt);
}

/* ──────────────────────────────────────────
   HISTORIQUE & PROGRÈS
────────────────────────────────────────── */
function addToHistory(phrase, globalScore) {
  sessionHistory.push({ phrase: phrase.substring(0,40)+'…', score: globalScore });
  renderHistory();
}

function renderHistory() {
  const count = sessionHistory.length;
  document.getElementById('attemptCount').textContent = `${count} tentative${count>1?'s':''}`;
  
  const avg = Math.round(sessionHistory.reduce((a,h)=>a+h.score,0)/count);
  document.getElementById('avgScore').textContent = avg + '%';

  const list = document.getElementById('historyList');
  list.innerHTML = sessionHistory.slice().reverse().map((h,i)=>{
    const cls = h.score>=80?'s-good':h.score>=60?'s-mid':'s-low';
    return `<div class="history-row">
      <span class="hist-num">${sessionHistory.length-i}</span>
      <span class="hist-phrase">${h.phrase}</span>
      <span class="hist-score ${cls}">${h.score}%</span>
    </div>`;
  }).join('');
}

/* ──────────────────────────────────────────
   PHRASES
────────────────────────────────────────── */
function getCurrentPhrase() {
  const list = PHRASES[currentDifficulty];
  return list[currentPhraseIndex % list.length];
}

function updatePhraseDisplay() {
  const p = getCurrentPhrase();
  document.getElementById('phraseText').textContent = p.text;
  document.getElementById('phrasePhonetic').textContent = p.phon;
  document.getElementById('analysis-section').classList.remove('visible');
}

function selectDifficulty(diff, btn) {
  currentDifficulty = diff;
  currentPhraseIndex = 0;
  document.querySelectorAll('.btn-phrase').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updatePhraseDisplay();
}

function newPhrase() {
  currentPhraseIndex = (currentPhraseIndex + 1) % PHRASES[currentDifficulty].length;
  updatePhraseDisplay();
  showToast('Nouvelle phrase sélectionnée !');
}

/* ──────────────────────────────────────────
   TOAST
────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

/* ──────────────────────────────────────────
   INIT
────────────────────────────────────────── */
drawFlatWave();
window.speechSynthesis.onvoiceschanged = () => {};

// Numéro de session (localStorage si dispo)
try {
  const prev = parseInt(localStorage.getItem('phonPro_session')||'0');
  sessionNum = prev + 1;
  localStorage.setItem('phonPro_session', sessionNum);
  document.getElementById('sessionBadge').textContent = `Séance ${sessionNum}`;
} catch(e){}
</script>
